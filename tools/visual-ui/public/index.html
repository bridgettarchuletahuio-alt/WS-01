<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>WWebJS Visual UI</title>
        <style>
            :root {
                --bg: #f4efe6;
                --card: #fffdf9;
                --text: #1f2a37;
                --muted: #6b7280;
                --ok: #1f9d55;
                --warn: #c27803;
                --err: #b42318;
                --border: #e5dccf;
                --accent: #0f766e;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                color: var(--text);
                font-family: "IBM Plex Sans", "Noto Sans SC", sans-serif;
                background:
                    radial-gradient(circle at 10% 10%, #fff6dd 0, transparent 40%),
                    radial-gradient(circle at 90% 90%, #dff5ec 0, transparent 35%),
                    var(--bg);
            }

            .wrap {
                max-width: 1180px;
                margin: 0 auto;
                padding: 24px;
            }

            .title {
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 12px;
                margin-bottom: 16px;
            }

            .title-right {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            h1 {
                margin: 0;
                font-size: 1.5rem;
                letter-spacing: 0.02em;
            }

            .badge {
                border-radius: 999px;
                padding: 6px 12px;
                font-weight: 700;
                background: #ece7dd;
                color: #4b5563;
            }

            .grid {
                display: grid;
                grid-template-columns: 360px 1fr;
                gap: 16px;
            }

            .card {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 16px;
                padding: 16px;
                box-shadow: 0 12px 25px rgba(15, 23, 42, 0.06);
            }

            .qrbox {
                min-height: 340px;
                display: flex;
                align-items: center;
                justify-content: center;
                border: 1px dashed #d5c9b7;
                border-radius: 12px;
                background: #fff;
            }

            #qr {
                width: 320px;
                max-width: 100%;
            }

            .muted {
                color: var(--muted);
                line-height: 1.5;
                margin-top: 10px;
            }

            .logs {
                max-height: 300px;
                overflow: auto;
                margin: 0;
                padding: 12px;
                list-style: none;
                border-radius: 12px;
                background: #1f2937;
                color: #f9fafb;
                font-family: "JetBrains Mono", monospace;
                font-size: 13px;
            }

            .logs li {
                padding: 4px 0;
                border-bottom: 1px solid rgba(255, 255, 255, 0.08);
                word-break: break-all;
            }

            .loading {
                margin-top: 12px;
                font-size: 14px;
                color: #374151;
            }

            .clients {
                margin-top: 14px;
                display: grid;
                gap: 10px;
            }

            .client-item {
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 10px;
                background: #fff;
            }

            .client-top {
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 8px;
                margin-bottom: 8px;
            }

            .client-id {
                font-family: "JetBrains Mono", monospace;
                font-size: 13px;
            }

            .client-role {
                font-size: 12px;
                border-radius: 999px;
                padding: 2px 8px;
                background: #e6fffa;
                color: #0f766e;
                border: 1px solid #b7efe7;
            }

            .client-status {
                font-size: 13px;
                color: #374151;
            }

            .client-actions {
                margin-top: 8px;
                display: flex;
                gap: 8px;
            }

            .btn {
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 6px 10px;
                background: #fffdf9;
                color: #1f2a37;
                cursor: pointer;
                font-size: 13px;
            }

            .btn:disabled {
                opacity: 0.55;
                cursor: not-allowed;
            }

            .btn-primary {
                background: #0f766e;
                color: #fff;
                border-color: #0f766e;
            }

            .client-qr {
                margin-top: 8px;
                width: 140px;
                max-width: 100%;
                border: 1px dashed #d5c9b7;
                border-radius: 8px;
                background: #fff;
            }

            .routes-wrap {
                margin-top: 12px;
            }

            .routes-form {
                display: grid;
                gap: 8px;
                margin-bottom: 12px;
            }

            .input {
                width: 100%;
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 8px 10px;
                background: #fff;
                color: var(--text);
            }

            .chips {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }

            .chip {
                display: inline-flex;
                align-items: center;
                gap: 4px;
                border: 1px solid var(--border);
                border-radius: 999px;
                padding: 4px 8px;
                font-size: 12px;
                background: #fff;
            }

            .routes-table {
                width: 100%;
                border-collapse: collapse;
                font-size: 13px;
            }

            .routes-table th,
            .routes-table td {
                text-align: left;
                border-bottom: 1px solid var(--border);
                padding: 8px 6px;
                vertical-align: top;
            }

            .error {
                color: var(--err);
                font-size: 13px;
                min-height: 20px;
            }

            /* 用户管理 */
            #user-mgmt-section {
                display: none;
            }
            #user-mgmt-section.visible {
                display: block;
            }
            .user-mgmt-card {
                margin-top: 16px;
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 16px;
                padding: 16px;
                box-shadow: 0 12px 25px rgba(15, 23, 42, 0.06);
            }
            .users-table {
                width: 100%;
                border-collapse: collapse;
                font-size: 13px;
                margin-top: 8px;
            }
            .users-table th,
            .users-table td {
                text-align: left;
                border-bottom: 1px solid var(--border);
                padding: 8px 6px;
                vertical-align: middle;
            }
            .users-table select {
                border: 1px solid var(--border);
                border-radius: 6px;
                padding: 3px 6px;
                background: #fff;
                font-size: 12px;
            }
            .toggle-approved {
                position: relative;
                display: inline-block;
                width: 36px;
                height: 20px;
                flex-shrink: 0;
            }
            .toggle-approved input {
                opacity: 0;
                width: 0;
                height: 0;
            }
            .toggle-approved .slider {
                position: absolute;
                inset: 0;
                border-radius: 20px;
                background: #d1d5db;
                cursor: pointer;
                transition: 0.2s;
            }
            .toggle-approved input:checked + .slider {
                background: #0f766e;
            }
            .toggle-approved .slider::before {
                content: '';
                position: absolute;
                width: 14px;
                height: 14px;
                left: 3px;
                top: 3px;
                border-radius: 50%;
                background: white;
                transition: 0.2s;
            }
            .toggle-approved input:checked + .slider::before {
                transform: translateX(16px);
            }
            .tag-self {
                font-size: 10px;
                background: #fef9c3;
                color: #854d0e;
                border-radius: 4px;
                padding: 1px 4px;
                margin-left: 4px;
            }

            @media (max-width: 900px) {
                .grid {
                    grid-template-columns: 1fr;
                }
            }
        </style>
    </head>
    <body>
        <div class="wrap">
            <div class="title">
                <h1>WhatsApp Bot 可视化控制台</h1>
                <div class="title-right">
                    <span id="user-badge" class="badge">未登录</span>
                    <span id="status" class="badge">starting</span>
                    <button id="logout-btn" class="btn">退出</button>
                </div>
            </div>

            <div class="grid">
                <section class="card">
                    <div class="qrbox">
                        <img id="qr" alt="登录二维码" hidden />
                        <div id="qr-empty" class="muted">等待二维码...</div>
                    </div>
                    <div class="loading" id="loading">加载状态: -</div>
                    <div class="clients" id="clients"></div>
                    <p class="muted">
                        登录后请用另一个账号给机器人发送 !ping，若自动回复 pong 说明功能正常。
                    </p>
                </section>

                <section class="card">
                    <h3 style="margin-top: 0">客户路由规则</h3>
                    <div class="routes-wrap">
                        <div class="routes-form">
                            <input id="chat-id-input" class="input" placeholder="客户Chat ID，如 8613xxxxx@c.us" />
                            <input id="demand-tag-input" class="input" placeholder="需求标签，如 金融/电商/高净值" />
                            <div class="chips" id="client-chips"></div>
                            <button id="save-route-btn" class="btn btn-primary">保存路由规则</button>
                            <div id="route-error" class="error"></div>
                        </div>

                        <table class="routes-table">
                            <thead>
                                <tr>
                                    <th>Chat ID</th>
                                    <th>需求标签</th>
                                    <th>筛选账号</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="routes-body"></tbody>
                        </table>
                    </div>

                    <h3>系统日志</h3>
                    <ul class="logs" id="logs"></ul>
                </section>
            </div>

            <!-- 用户管理（仅 admin） -->
            <div id="user-mgmt-section">
                <div class="user-mgmt-card">
                    <h3 style="margin:0 0 4px">用户管理</h3>
                    <p class="muted" style="margin:0 0 8px;font-size:13px">管理注册用户的角色与访问权限。未审批用户登录时会被拒绝。</p>
                    <table class="users-table">
                        <thead>
                            <tr>
                                <th>用户名</th>
                                <th>角色</th>
                                <th>已审批</th>
                                <th>注册时间</th>
                            </tr>
                        </thead>
                        <tbody id="users-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <script src="/socket.io/socket.io.js"></script>
        <script>
            const tokenKey = 'wwebjs_visual_token';
            const token = localStorage.getItem(tokenKey);
            if (!token) {
                window.location.href = '/auth.html';
            }

            const statusEl = document.getElementById('status');
            const qrEl = document.getElementById('qr');
            const qrEmptyEl = document.getElementById('qr-empty');
            const logsEl = document.getElementById('logs');
            const loadingEl = document.getElementById('loading');
            const clientsEl = document.getElementById('clients');
            const logoutBtn = document.getElementById('logout-btn');
            const userBadgeEl = document.getElementById('user-badge');
            const chatIdInput = document.getElementById('chat-id-input');
            const demandTagInput = document.getElementById('demand-tag-input');
            const clientChipsEl = document.getElementById('client-chips');
            const saveRouteBtn = document.getElementById('save-route-btn');
            const routeErrorEl = document.getElementById('route-error');
            const routesBodyEl = document.getElementById('routes-body');

            const socket = io();
            let clientsState = {};
            let roleState = { mainClientId: null };
            let availableRouteClients = [];
            let currentUser = null;

            const authFetch = (url, options = {}) => {
                return fetch(url, {
                    ...options,
                    headers: {
                        'content-type': 'application/json',
                        Authorization: `Bearer ${localStorage.getItem(tokenKey) || ''}`,
                        ...(options.headers || {}),
                    },
                });
            };

            const setRouteError = (msg) => {
                routeErrorEl.textContent = msg || '';
            };

            const selectedRouteClientIds = () => {
                return [...clientChipsEl.querySelectorAll('input[type="checkbox"]:checked')].map(
                    (item) => item.value,
                );
            };

            const renderRouteClientChoices = () => {
                clientChipsEl.innerHTML = '';
                const list = availableRouteClients.filter((id) => id !== roleState.mainClientId);
                if (!list.length) {
                    const span = document.createElement('span');
                    span.className = 'muted';
                    span.textContent = '暂无可选筛选账号';
                    clientChipsEl.appendChild(span);
                    return;
                }
                list.forEach((id) => {
                    const label = document.createElement('label');
                    label.className = 'chip';
                    const input = document.createElement('input');
                    input.type = 'checkbox';
                    input.value = id;
                    label.appendChild(input);
                    label.appendChild(document.createTextNode(id));
                    clientChipsEl.appendChild(label);
                });
            };

            const ensureAuth = async () => {
                try {
                    const resp = await authFetch('/api/auth/me', { method: 'GET' });
                    if (!resp.ok) {
                        localStorage.removeItem(tokenKey);
                        window.location.href = '/auth.html';
                        return false;
                    }
                    const data = await resp.json();
                    currentUser = data.user;
                    userBadgeEl.textContent = `${data.user.username} (${data.user.role})`;
                    if (data.user.role === 'admin') {
                        document.getElementById('user-mgmt-section').classList.add('visible');
                        await loadUsers();
                    }
                    return true;
                } catch {
                    localStorage.removeItem(tokenKey);
                    window.location.href = '/auth.html';
                    return false;
                }
            };

            const renderUsers = (users) => {
                const tbody = document.getElementById('users-body');
                tbody.innerHTML = '';
                users.forEach((u) => {
                    const isSelf = currentUser && u.id === currentUser.id;
                    const tr = document.createElement('tr');
                    const createdDate = new Date(u.created_at).toLocaleDateString('zh-CN');

                    // 角色 select
                    const roleSelect = document.createElement('select');
                    ['admin', 'operator'].forEach((r) => {
                        const opt = document.createElement('option');
                        opt.value = r;
                        opt.textContent = r === 'admin' ? '管理员' : '操作员';
                        if (r === u.role) opt.selected = true;
                        roleSelect.appendChild(opt);
                    });
                    if (isSelf) roleSelect.disabled = true;
                    roleSelect.addEventListener('change', () => updateUser(u.id, { role: roleSelect.value }));

                    // 审批 toggle
                    const label = document.createElement('label');
                    label.className = 'toggle-approved';
                    const chk = document.createElement('input');
                    chk.type = 'checkbox';
                    chk.checked = u.approved;
                    if (isSelf) chk.disabled = true;
                    const slider = document.createElement('span');
                    slider.className = 'slider';
                    label.appendChild(chk);
                    label.appendChild(slider);
                    chk.addEventListener('change', () => updateUser(u.id, { approved: chk.checked }));

                    const nameTd = document.createElement('td');
                    nameTd.textContent = u.username;
                    if (isSelf) {
                        const selfTag = document.createElement('span');
                        selfTag.className = 'tag-self';
                        selfTag.textContent = '自己';
                        nameTd.appendChild(selfTag);
                    }

                    const roleTd = document.createElement('td');
                    roleTd.appendChild(roleSelect);

                    const approvedTd = document.createElement('td');
                    approvedTd.appendChild(label);

                    const dateTd = document.createElement('td');
                    dateTd.textContent = createdDate;

                    tr.appendChild(nameTd);
                    tr.appendChild(roleTd);
                    tr.appendChild(approvedTd);
                    tr.appendChild(dateTd);
                    tbody.appendChild(tr);
                });
            };

            const loadUsers = async () => {
                const resp = await authFetch('/api/users', { method: 'GET' });
                const data = await resp.json().catch(() => ({ ok: false, users: [] }));
                if (data.ok) renderUsers(data.users || []);
            };

            const updateUser = async (id, patch) => {
                const resp = await authFetch(`/api/users/${id}`, {
                    method: 'PATCH',
                    body: JSON.stringify(patch),
                });
                const data = await resp.json().catch(() => ({ ok: false }));
                if (!data.ok) {
                    alert(data.message || '更新失败');
                    await loadUsers();
                }
            };

            const callClientAction = async (clientId, action) => {
                try {
                    const resp = await authFetch(`/api/clients/${encodeURIComponent(clientId)}/${action}`, {
                        method: 'POST',
                    });
                    if (!resp.ok) {
                        const data = await resp.json().catch(() => ({}));
                        alert(data.message || '操作失败');
                    }
                } catch {
                    alert('网络异常，操作失败');
                }
            };

            const renderClients = () => {
                const entries = Object.entries(clientsState);
                clientsEl.innerHTML = '';

                if (!entries.length) {
                    const empty = document.createElement('div');
                    empty.className = 'muted';
                    empty.textContent = '暂无账号状态';
                    clientsEl.appendChild(empty);
                    return;
                }

                for (const [clientId, info] of entries) {
                    const item = document.createElement('div');
                    item.className = 'client-item';

                    const top = document.createElement('div');
                    top.className = 'client-top';

                    const idEl = document.createElement('div');
                    idEl.className = 'client-id';
                    idEl.textContent = clientId;

                    const roleEl = document.createElement('span');
                    roleEl.className = 'client-role';
                    roleEl.textContent =
                        clientId === roleState.mainClientId ? '主机器人' : '筛选账号';

                    top.appendChild(idEl);
                    top.appendChild(roleEl);

                    const statusInfo = document.createElement('div');
                    statusInfo.className = 'client-status';
                    statusInfo.textContent = `状态: ${info.status || 'unknown'}`;

                    const actions = document.createElement('div');
                    actions.className = 'client-actions';

                    const onlineBtn = document.createElement('button');
                    onlineBtn.className = 'btn';
                    onlineBtn.textContent = '上线';
                    onlineBtn.disabled = info.status === 'ready' || info.status === 'authenticated';
                    onlineBtn.addEventListener('click', () => callClientAction(clientId, 'online'));

                    const offlineBtn = document.createElement('button');
                    offlineBtn.className = 'btn';
                    offlineBtn.textContent = '下线';
                    offlineBtn.disabled = info.status === 'manual_offline';
                    offlineBtn.addEventListener('click', () => callClientAction(clientId, 'offline'));

                    actions.appendChild(onlineBtn);
                    actions.appendChild(offlineBtn);

                    item.appendChild(top);
                    item.appendChild(statusInfo);
                    item.appendChild(actions);

                    if (info.qrDataUrl) {
                        const qr = document.createElement('img');
                        qr.className = 'client-qr';
                        qr.src = info.qrDataUrl;
                        qr.alt = `${clientId} 二维码`;
                        item.appendChild(qr);
                    }

                    clientsEl.appendChild(item);
                }
            };

            const setStatusColor = (status) => {
                if (status === 'ready') {
                    statusEl.style.background = 'rgba(31,157,85,0.14)';
                    statusEl.style.color = 'var(--ok)';
                    return;
                }
                if (
                    status === 'auth_failure' ||
                    status === 'disconnected' ||
                    status === 'crashed'
                ) {
                    statusEl.style.background = 'rgba(180,35,24,0.14)';
                    statusEl.style.color = 'var(--err)';
                    return;
                }
                if (status === 'waiting_for_scan') {
                    statusEl.style.background = 'rgba(194,120,3,0.14)';
                    statusEl.style.color = 'var(--warn)';
                    return;
                }
                statusEl.style.background = 'rgba(15,118,110,0.14)';
                statusEl.style.color = 'var(--accent)';
            };

            const pushLog = (line) => {
                const li = document.createElement('li');
                li.textContent = line;
                logsEl.appendChild(li);
                while (logsEl.children.length > 200) {
                    logsEl.removeChild(logsEl.firstChild);
                }
                logsEl.scrollTop = logsEl.scrollHeight;
            };

            const renderRoutes = (items) => {
                routesBodyEl.innerHTML = '';
                if (!items.length) {
                    const tr = document.createElement('tr');
                    const td = document.createElement('td');
                    td.colSpan = 4;
                    td.className = 'muted';
                    td.textContent = '暂无路由规则';
                    tr.appendChild(td);
                    routesBodyEl.appendChild(tr);
                    return;
                }

                items.forEach((item) => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${item.chatId}</td>
                        <td>${item.demandTag}</td>
                        <td>${(item.clientIds || []).join(', ')}</td>
                        <td><button class="btn" data-id="${item.id}">删除</button></td>
                    `;
                    tr.querySelector('button').addEventListener('click', async () => {
                        const resp = await authFetch(`/api/routes/${item.id}`, { method: 'DELETE' });
                        if (!resp.ok) {
                            const data = await resp.json().catch(() => ({}));
                            alert(data.message || '删除失败');
                            return;
                        }
                        await loadRoutes();
                    });
                    routesBodyEl.appendChild(tr);
                });
            };

            const loadRoutes = async () => {
                const resp = await authFetch('/api/routes', { method: 'GET' });
                const data = await resp.json().catch(() => ({ ok: false, items: [] }));
                if (!resp.ok || !data.ok) {
                    setRouteError(data.message || '加载路由失败');
                    return;
                }
                setRouteError('');
                availableRouteClients = data.availableClientIds || [];
                renderRouteClientChoices();
                renderRoutes(data.items || []);
            };

            saveRouteBtn.addEventListener('click', async () => {
                const chatId = chatIdInput.value.trim();
                const demandTag = demandTagInput.value.trim();
                const clientIds = selectedRouteClientIds();

                const resp = await authFetch('/api/routes', {
                    method: 'POST',
                    body: JSON.stringify({ chatId, demandTag, clientIds }),
                });
                const data = await resp.json().catch(() => ({ ok: false }));
                if (!resp.ok || !data.ok) {
                    setRouteError(data.message || '保存失败');
                    return;
                }
                setRouteError('保存成功');
                chatIdInput.value = '';
                demandTagInput.value = '';
                clientChipsEl
                    .querySelectorAll('input[type="checkbox"]')
                    .forEach((item) => (item.checked = false));
                await loadRoutes();
            });

            logoutBtn.addEventListener('click', () => {
                localStorage.removeItem(tokenKey);
                window.location.href = '/auth.html';
            });

            socket.on('status', (status) => {
                statusEl.textContent = status;
                setStatusColor(status);
            });

            socket.on('loading', (loading) => {
                if (!loading) {
                    loadingEl.textContent = '加载状态: -';
                    return;
                }
                loadingEl.textContent = `加载状态: ${loading.percent}% ${loading.message}`;
            });

            socket.on('qr', (dataUrl) => {
                if (dataUrl) {
                    qrEl.src = dataUrl;
                    qrEl.hidden = false;
                    qrEmptyEl.hidden = true;
                    return;
                }
                qrEl.hidden = true;
                qrEmptyEl.hidden = false;
            });

            socket.on('logs', (logs) => {
                logsEl.innerHTML = '';
                logs.forEach(pushLog);
            });

            socket.on('role', (role) => {
                roleState = role || { mainClientId: null };
                renderClients();
                renderRouteClientChoices();
            });

            socket.on('clients', (clients) => {
                clientsState = clients || {};
                renderClients();
            });

            socket.on('log', (line) => pushLog(line));

            (async () => {
                const ok = await ensureAuth();
                if (!ok) return;
                await loadRoutes();
            })();
        </script>
    </body>
</html>
