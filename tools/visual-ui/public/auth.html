<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>登录 | WWebJS Visual UI</title>
        <style>
            :root {
                --bg: #f4efe6;
                --card: #fffdf9;
                --text: #1f2a37;
                --muted: #6b7280;
                --err: #b42318;
                --border: #e5dccf;
                --accent: #0f766e;
            }
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                color: var(--text);
                font-family: "IBM Plex Sans", "Noto Sans SC", sans-serif;
                background:
                    radial-gradient(circle at 10% 10%, #fff6dd 0, transparent 40%),
                    radial-gradient(circle at 90% 90%, #dff5ec 0, transparent 35%),
                    var(--bg);
            }
            .card {
                width: min(420px, 92vw);
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 16px;
                padding: 20px;
                box-shadow: 0 12px 25px rgba(15, 23, 42, 0.06);
            }
            h1 {
                margin: 0 0 8px;
                font-size: 1.4rem;
            }
            .muted {
                color: var(--muted);
                margin-bottom: 14px;
            }
            .tabs {
                display: flex;
                gap: 8px;
                margin-bottom: 12px;
            }
            .tab {
                border: 1px solid var(--border);
                border-radius: 999px;
                padding: 6px 10px;
                font-size: 13px;
                cursor: pointer;
                background: #fff;
            }
            .tab.active {
                border-color: var(--accent);
                color: #fff;
                background: var(--accent);
            }
            .input {
                width: 100%;
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 10px;
                margin-bottom: 10px;
                background: #fff;
                color: var(--text);
            }
            .btn {
                width: 100%;
                border: 1px solid var(--accent);
                background: var(--accent);
                color: #fff;
                border-radius: 8px;
                padding: 10px;
                cursor: pointer;
                font-size: 14px;
            }
            .error {
                color: var(--err);
                min-height: 20px;
                margin-top: 8px;
                font-size: 13px;
            }
        </style>
    </head>
    <body>
        <section class="card">
            <h1>控制台账号</h1>
            <div class="muted">Railway + PostgreSQL 注册与登录</div>

            <div class="tabs">
                <button class="tab active" id="tab-login">登录</button>
                <button class="tab" id="tab-register">注册</button>
            </div>

            <input id="username" class="input" placeholder="用户名（字母数字下划线）" />
            <input id="password" class="input" type="password" placeholder="密码（至少6位）" />
            <button id="submit-btn" class="btn">登录</button>
            <div id="error" class="error"></div>
        </section>

        <script>
            const tokenKey = 'wwebjs_visual_token';
            const tabLogin = document.getElementById('tab-login');
            const tabRegister = document.getElementById('tab-register');
            const usernameEl = document.getElementById('username');
            const passwordEl = document.getElementById('password');
            const submitBtn = document.getElementById('submit-btn');
            const errorEl = document.getElementById('error');

            let mode = 'login';

            const setMode = (next) => {
                mode = next;
                tabLogin.classList.toggle('active', next === 'login');
                tabRegister.classList.toggle('active', next === 'register');
                submitBtn.textContent = next === 'login' ? '登录' : '注册';
                errorEl.textContent = '';
            };

            tabLogin.addEventListener('click', () => setMode('login'));
            tabRegister.addEventListener('click', () => setMode('register'));

            submitBtn.addEventListener('click', async () => {
                const username = usernameEl.value.trim().toLowerCase();
                const password = passwordEl.value;

                if (!username || !password) {
                    errorEl.textContent = '请填写用户名和密码';
                    return;
                }

                try {
                    const resp = await fetch(
                        mode === 'login' ? '/api/auth/login' : '/api/auth/register',
                        {
                            method: 'POST',
                            headers: { 'content-type': 'application/json' },
                            body: JSON.stringify({ username, password }),
                        },
                    );
                    const data = await resp.json().catch(() => ({ ok: false }));
                    if (!resp.ok || !data.ok) {
                        errorEl.textContent = data.message || '操作失败';
                        return;
                    }

                    localStorage.setItem(tokenKey, data.token);
                    window.location.href = '/';
                } catch {
                    errorEl.textContent = '网络异常，请稍后重试';
                }
            });
        </script>
    </body>
</html>
